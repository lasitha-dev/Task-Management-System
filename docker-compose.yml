services:
  # ============================================
  # MongoDB Database
  # ============================================
  mongodb:
    image: mongo:7.0
    container_name: mern-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db
    networks:
      - mern-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  # ============================================
  # API Gateway Service
  # ============================================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - PORT=8000
      - NODE_ENV=production
      - USER_SERVICE_URL=http://user-management:5001
      - TASK_SERVICE_URL=http://task-management:5002
    depends_on:
      - user-management
      - task-management
    networks:
      - mern-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # User Management Service
  # ============================================
  user-management:
    build:
      context: ./user-management
      dockerfile: Dockerfile
    container_name: user-management
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://admin:admin123@mongodb:27017/user-management?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE}
      - NODE_ENV=production
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=http://localhost:5001/api/users/google/callback
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mern-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Task Management Service
  # ============================================
  task-management:
    build:
      context: ./task-management
      dockerfile: Dockerfile
    container_name: task-management
    restart: unless-stopped
    ports:
      - "127.0.0.1:5002:5002"
    environment:
      - PORT=5002
      - MONGO_URI=mongodb://admin:admin123@mongodb:27017/task-management?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE}
      - NODE_ENV=production
      - USER_SERVICE_URL=http://user-management:5001
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mern-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Task Management Frontend
  # ============================================
  task-frontend:
    build:
      context: ./task-management/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://api-gateway:8000
    container_name: task-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:80"
    depends_on:
      - api-gateway
    networks:
      - mern-network

  # ============================================
  # User Management Frontend
  # ============================================
  user-frontend:
    build:
      context: ./user-management/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://127.0.0.1:8000/api/users
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    container_name: user-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - api-gateway
    networks:
      - mern-network

# ============================================
# Networks
# ============================================
networks:
  mern-network:
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  mongodb_data:
    driver: local
