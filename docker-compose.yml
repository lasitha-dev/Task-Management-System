services:
  # ============================================
  # API Gateway Service
  # ============================================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - PORT=8000
      - NODE_ENV=production
      - USER_SERVICE_URL=http://user-management:5001
      - TASK_SERVICE_URL=http://task-management:5002
    depends_on:
      - user-management
      - task-management
    networks:
      - mern-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # User Management Service (Using MongoDB Atlas)
  # ============================================
  user-management:
    build:
      context: ./user-management
      dockerfile: Dockerfile
    container_name: user-management
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=mongodb+srv://sathnarakumarasinghe_db_user:Wm32cnshkjWf0gIG@usermanagement.82h7tlu.mongodb.net/user-management-db?appName=UserManagement
      - JWT_SECRET=4a071af79eaf92a78d3ab48a3f7b0770624e462a5e6c59440ad0630828b1eac9
      - JWT_EXPIRE=30d
      - NODE_ENV=production
      - GOOGLE_CLIENT_ID=995578316094-qdi6aqve8ksss8coga91353b49ea7veh.apps.googleusercontent.com
      - GOOGLE_CLIENT_SECRET=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
      - GOOGLE_CALLBACK_URL=http://localhost:5001/api/users/google/callback
    networks:
      - mern-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Task Management Service (Using MongoDB Atlas)
  # ============================================
  task-management:
    build:
      context: ./task-management
      dockerfile: Dockerfile
    container_name: task-management
    restart: unless-stopped
    ports:
      - "127.0.0.1:5002:5002"
    environment:
      - PORT=5002
      - MONGO_URI=mongodb+srv://User2:Pramod123@cluster0.8e4nq9e.mongodb.net/task-management?appName=Cluster0
      - JWT_SECRET=4a071af79eaf92a78d3ab48a3f7b0770624e462a5e6c59440ad0630828b1eac9
      - JWT_EXPIRE=30d
      - NODE_ENV=production
      - USER_SERVICE_URL=http://user-management:5001
      - API_GATEWAY_URL=http://api-gateway:8000
    networks:
      - mern-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Task Management Frontend
  # ============================================
  task-frontend:
    build:
      context: ./task-management/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://127.0.0.1:8000
    container_name: task-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:80"
    depends_on:
      - api-gateway
    networks:
      - mern-network

  # ============================================
  # User Management Frontend
  # ============================================
  user-frontend:
    build:
      context: ./user-management/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://127.0.0.1:8000/api/users
        - VITE_GOOGLE_CLIENT_ID=995578316094-qdi6aqve8ksss8coga91353b49ea7veh.apps.googleusercontent.com
    container_name: user-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - api-gateway
    networks:
      - mern-network

# ============================================
# Networks
# ============================================
networks:
  mern-network:
    driver: bridge
