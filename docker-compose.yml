version: '3.8'

services:
  # ============================================
  # MongoDB Database
  # ============================================
  mongodb:
    image: mongo:7.0
    container_name: mern-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db
    networks:
      - mern-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  # ============================================
  # API Gateway Service
  # ============================================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - NODE_ENV=production
      - USER_SERVICE_URL=http://user-management:5001
      - TASK_SERVICE_URL=http://task-management:5002
      - NOTIFICATION_SERVICE_URL=http://notifications-management:5003
      - REPORTING_SERVICE_URL=http://reporting-analytics:5004
    depends_on:
      - user-management
      - task-management
      - notifications-management
      - reporting-analytics
    networks:
      - mern-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # User Management Service
  # ============================================
  user-management:
    build:
      context: ./user-management
      dockerfile: Dockerfile
    container_name: user-management
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/user-management?authSource=admin
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_EXPIRE=7d
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mern-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Task Management Service
  # ============================================
  task-management:
    build:
      context: ./task-management
      dockerfile: Dockerfile
    container_name: task-management
    restart: unless-stopped
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/task-management?authSource=admin
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - NODE_ENV=production
      - USER_SERVICE_URL=http://user-management:5001
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mern-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Notifications Management Service
  # ============================================
  notifications-management:
    build:
      context: ./notifications-management
      dockerfile: Dockerfile
    container_name: notifications-management
    restart: unless-stopped
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/notifications-management?authSource=admin
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - NODE_ENV=production
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mern-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Reporting Analytics Service
  # ============================================
  reporting-analytics:
    build:
      context: ./reporting-analytics
      dockerfile: Dockerfile
    container_name: reporting-analytics
    restart: unless-stopped
    ports:
      - "5004:5004"
    environment:
      - PORT=5004
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/reporting-analytics?authSource=admin
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - NODE_ENV=production
      - TASK_SERVICE_URL=http://task-management:5002
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mern-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Frontend Application
  # ============================================
  frontend:
    build:
      context: ./task-management/frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://api-gateway:5000
    depends_on:
      - api-gateway
    networks:
      - mern-network

# ============================================
# Networks
# ============================================
networks:
  mern-network:
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  mongodb_data:
    driver: local
