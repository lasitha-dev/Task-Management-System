openapi: 3.0.3
info:
  title: Notifications Management Service API
  description: >
    Communication hub — in-app and email alerts for task changes, deadlines,
    comments, team updates, and system events.
  version: 1.0.0
servers:
  - url: http://localhost:5003
    description: Local development server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    NotificationListResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        data:
          type: object
          properties:
            notifications:
              type: array
              items:
                $ref: '#/components/schemas/Notification'
            pagination:
              type: object
              properties:
                total: { type: integer }
                page: { type: integer }
                limit: { type: integer }
                pages: { type: integer }

    Notification:
      type: object
      properties:
        _id: { type: string }
        type:
          type: string
          enum: [task_assigned, task_updated, deadline_reminder, comment_added, team_update, system_alert]
        title: { type: string }
        message: { type: string }
        recipientId: { type: string }
        isRead: { type: boolean }
        priority:
          type: string
          enum: [low, medium, high, critical]
        metadata: { type: object }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateNotificationInput:
      type: object
      required: [type, title, message, recipientId]
      properties:
        type:
          type: string
          enum: [task_assigned, task_updated, deadline_reminder, comment_added, team_update, system_alert]
        title: { type: string, maxLength: 200 }
        message: { type: string, maxLength: 1000 }
        recipientId: { type: string }
        priority:
          type: string
          enum: [low, medium, high, critical]
        metadata:
          type: object

    UpdatePreferencesInput:
      type: object
      properties:
        emailEnabled: { type: boolean }
        inAppEnabled: { type: boolean }
tags:
  - name: Notifications
    description: CRUD operations for in-app notifications
  - name: Preferences
    description: Per-user notification delivery preferences

paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: OK
                  service:
                    type: string
                    example: notifications-management

  /api/notifications:
    get:
      summary: List notifications
      description: Retrieve paginated notifications with optional filters.
      tags: [Notifications]
      security:
        - bearerAuth: []
      parameters:
        - name: recipientId
          in: query
          schema: { type: string }
          description: Filter by recipient user ID
        - name: type
          in: query
          schema:
            type: string
            enum: [task_assigned, task_updated, deadline_reminder, comment_added, team_update, system_alert]
        - name: isRead
          in: query
          schema: { type: string, enum: ['true', 'false'] }
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated list of notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '500':
          description: Internal Server Error
        '401':
          description: Missing or invalid JWT
        '403':
          description: recipientId does not match the authenticated user

  /api/notifications/unread-count:
    get:
      summary: Get unread notification count
      tags: [Notifications]
      security:
        - bearerAuth: []
      parameters:
        - name: recipientId
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      count: { type: integer, example: 7 }
        '401':
          description: Missing or invalid JWT
        '403':
          description: recipientId does not match the authenticated user

  /api/notifications/read-all:
    patch:
      summary: Mark all notifications as read
      tags: [Notifications]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recipientId]
              properties:
                recipientId: { type: string }
      responses:
        '200':
          description: All notifications marked as read
        '400':
          description: Validation error
        '401':
          description: Missing or invalid JWT
        '403':
          description: recipientId does not match the authenticated user

  /api/notifications/{id}:
    get:
      summary: Get a notification by ID
      tags: [Notifications]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Notification details
        '400':
          description: Invalid ID format
        '404':
          description: Notification not found
        '401':
          description: Missing or invalid JWT
    delete:
      summary: Delete a notification
      tags: [Notifications]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Notification deleted
        '400':
          description: Invalid ID format
        '404':
          description: Notification not found
        '401':
          description: Missing or invalid JWT

  /api/notifications/{id}/read:
    patch:
      summary: Mark a notification as read
      tags: [Notifications]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Notification marked as read
        '400':
          description: Invalid ID format
        '404':
          description: Notification not found
        '401':
          description: Missing or invalid JWT

  /api/notifications/preferences/{userId}:
    get:
      summary: Get user notification preferences
      tags: [Preferences]
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: User preferences
        '401':
          description: Missing or invalid JWT
        '403':
          description: userId does not match the authenticated user
    put:
      summary: Update user notification preferences
      tags: [Preferences]
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePreferencesInput'
      responses:
        '200':
          description: Preferences updated
        '400':
          description: Validation error
        '401':
          description: Missing or invalid JWT
        '403':
          description: userId does not match the authenticated user

  /api/notifications/internal:
    post:
      summary: Create a notification from another microservice
      tags: [Notifications]
      parameters:
        - name: x-service-name
          in: header
          required: true
          schema: { type: string }
        - name: x-internal-service-token
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNotificationInput'
      responses:
        '201':
          description: Notification created
        '400':
          description: Validation error
        '403':
          description: Invalid internal service credentials
