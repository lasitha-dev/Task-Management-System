name: Trigger auto deployment for user-management

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/user-management-AutoDeployTrigger-93309ec4-9f99-4213-ae0e-39a647f3af3b.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.USERMANAGEMENT_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.USERMANAGEMENT_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.USERMANAGEMENT_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: taskappregistry9921.azurecr.io
          registryUsername: ${{ secrets.USERMANAGEMENT_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.USERMANAGEMENT_REGISTRY_PASSWORD }}
          containerAppName: user-management
          resourceGroup: task-management
          imageToBuild: taskappregistry9921.azurecr.io/user-management:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


