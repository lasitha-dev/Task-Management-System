# =============================================================================
# CI/CD Pipeline for Reporting & Analytics Microservice
# =============================================================================
# This workflow handles the full lifecycle: Build → Test → Security Scan →
# Docker Image Push → Deployment for the Reporting & Analytics service.
# It only triggers when files inside reporting-analytics/ change.
# =============================================================================

name: Reporting & Analytics CI/CD

# ---------------------------------------------------------------------------
# Trigger: Only run on pushes to 'main' that modify reporting-analytics files
# ---------------------------------------------------------------------------
on:
  push:
    branches: [main, develop, feature/reporting-analytics]
    paths:
      - 'reporting-analytics/**'
      - '.github/workflows/reporting-analytics-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'reporting-analytics/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/reporting-analytics

# ---------------------------------------------------------------------------
# Job 1: Build & Test
# ---------------------------------------------------------------------------
# Installs dependencies and runs the Jest test suite with coverage reporting.
# This is the gate — all subsequent jobs depend on this passing.
# ---------------------------------------------------------------------------
jobs:
  build-and-test:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./reporting-analytics

    steps:
      # Step 1: Checkout the repository source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js 18 runtime (matches our Dockerfile base)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: reporting-analytics/package-lock.json

      # Step 3: Install dependencies using clean install for reproducibility
      - name: Install Dependencies
        run: npm ci
        env:
          CI: true

      # Step 4: Run unit/integration tests with coverage output
      - name: Run Tests
        run: npm test
        env:
          NODE_ENV: test

      # Step 5: Upload coverage to Codecov
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: reporting-analytics-coverage
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Job 2: Security Scan (DevSecOps)
  # ---------------------------------------------------------------------------
  # Uses Snyk to scan for vulnerabilities in both code and dependencies.
  # Continues on error so findings are logged without blocking the pipeline.
  # Requires SNYK_TOKEN secret to be configured in the repository.
  # ---------------------------------------------------------------------------
  security-scan:
    name: 🔒 Snyk Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: ./reporting-analytics

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: reporting-analytics/package-lock.json

      # Install deps so Snyk can resolve the full dependency tree
      - name: Install Dependencies
        run: npm ci

      # Run Snyk vulnerability scan on the project dependencies
      - name: Run Snyk Vulnerability Scan
        run: npx snyk test --severity-threshold=high
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 3: Docker Build & Push
  # ---------------------------------------------------------------------------
  # Builds the Docker image using the service's Dockerfile (node:18-alpine)
  # and pushes it to GitHub Container Registry with tags:
  #   - 'latest' for latest stable
  #   - '<commit-sha>' for traceability
  #   - 'main' for main branch
  # ---------------------------------------------------------------------------
  docker-build-push:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Authenticate with GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Set up Docker Buildx for advanced build features
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Extract metadata for Docker image tags
      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/reporting-analytics
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      # Build and push the container image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./reporting-analytics
          file: ./reporting-analytics/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Job 4: Deploy to AWS App Runner
  # ---------------------------------------------------------------------------
  # Deploys the Docker image to AWS App Runner for production hosting.
  # Only runs on successful push to main branch.
  # Requires AWS credentials configured as repository secrets.
  # ---------------------------------------------------------------------------
  deploy:
    name: 🚀 Deploy to AWS App Runner
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Configure AWS credentials for deployment
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      # Deploy service to AWS App Runner
      - name: Deploy to AWS App Runner
        run: |
          # Create or update AppRunner service
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='reporting-analytics'].ServiceArn" \
            --output text 2>/dev/null || echo "")
          
          if [ -z "$SERVICE_ARN" ]; then
            echo "Creating new AppRunner service..."
            aws apprunner create-service \
              --service-name reporting-analytics \
              --source-configuration \
                ImageRepository="{RepositoryUrl=${{ env.REGISTRY }}/${{ github.repository }}/reporting-analytics,ImageRepositoryType=ECR_PUBLIC,ImageConfiguration={Port=5000,StartCommand='node src/app.js'}}" \
              --instance-configuration Cpu=1,Memory=2GB \
              --auto-deployment-config AutoDeploymentsEnabled=true
          else
            echo "Updating existing AppRunner service..."
            aws apprunner update-service \
              --service-arn "$SERVICE_ARN" \
              --source-configuration \
                ImageRepository="{RepositoryUrl=${{ env.REGISTRY }}/${{ github.repository }}/reporting-analytics,ImageRepositoryType=ECR_PUBLIC,ImageConfiguration={Port=5000,StartCommand='node src/app.js'}}"
          fi
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Job 5: Notify Results
  # ---------------------------------------------------------------------------
  notify:
    name: 📢 Notify Results
    runs-on: ubuntu-latest
    if: always()
    needs: [build-and-test, security-scan, docker-build-push, deploy]

    steps:
      - name: Check Pipeline Status
        run: |
          if [ "${{ needs.build-and-test.result }}" == "failure" ]; then
            echo "❌ Tests Failed - Pipeline stopped"
            exit 1
          fi
          if [ "${{ needs.security-scan.result }}" == "failure" ]; then
            echo "⚠️  Security scan failed - Review results"
          fi
          if [ "${{ needs.docker-build-push.result }}" == "success" ]; then
            echo "✅ Docker image built and pushed successfully"
          fi
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "🚀 Deployment to AWS App Runner successful"
          fi

