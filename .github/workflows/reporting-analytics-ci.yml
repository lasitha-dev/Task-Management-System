# =============================================================================
# CI/CD Pipeline for Reporting & Analytics Microservice
# =============================================================================
# This workflow handles the full lifecycle: Build → Test → Security Scan →
# Docker Image Push → Deployment for the Reporting & Analytics service.
# It only triggers when files inside reporting-analytics/ change.
# =============================================================================

name: Reporting & Analytics CI/CD

# ---------------------------------------------------------------------------
# Trigger: Only run on pushes to 'main' that modify reporting-analytics files
# ---------------------------------------------------------------------------
on:
  push:
    branches: [main, develop, feature/reporting-analytics]
    paths:
      - 'reporting-analytics/**'
      - '.github/workflows/reporting-analytics-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'reporting-analytics/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/reporting-analytics

# ---------------------------------------------------------------------------
# Job 1: Build & Test
# ---------------------------------------------------------------------------
# Installs dependencies and runs the Jest test suite with coverage reporting.
# This is the gate — all subsequent jobs depend on this passing.
# ---------------------------------------------------------------------------
jobs:
  build-and-test:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./reporting-analytics

    steps:
      # Step 1: Checkout the repository source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js 18 runtime (matches our Dockerfile base)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: reporting-analytics/package-lock.json

      # Step 3: Install dependencies using clean install for reproducibility
      - name: Install Dependencies
        run: npm ci
        env:
          CI: true

      # Step 4: Run unit/integration tests with coverage output
      - name: Run Tests
        run: npm test
        env:
          NODE_ENV: test

      # Step 5: Upload coverage to Codecov
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: reporting-analytics-coverage
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Job 2: Security Scan (DevSecOps)
  # ---------------------------------------------------------------------------
  # Uses Snyk to scan for vulnerabilities in both code and dependencies.
  # Continues on error so findings are logged without blocking the pipeline.
  # Requires SNYK_TOKEN secret to be configured in the repository.
  # ---------------------------------------------------------------------------
  security-scan:
    name: 🔒 Snyk Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: ./reporting-analytics

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: reporting-analytics/package-lock.json

      # Install deps so Snyk can resolve the full dependency tree
      - name: Install Dependencies
        run: npm ci

      # Run Snyk vulnerability scan on the project dependencies
      - name: Run Snyk Vulnerability Scan
        run: npx snyk test --severity-threshold=high
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 3: Docker Build & Push to Azure Container Registry (ACR)
  # ---------------------------------------------------------------------------
  docker-build-push:
    name: 🐳 Docker Build & Push to Azure
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Authenticate with Azure Container Registry using your secrets
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: taskappregistry9921.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Build and push the container image to Azure
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./reporting-analytics
          file: ./reporting-analytics/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            taskappregistry9921.azurecr.io/reporting-analytics:latest
            taskappregistry9921.azurecr.io/reporting-analytics:${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Job 4: Deploy (Placeholder)
  # ---------------------------------------------------------------------------
  # This job serves as a placeholder for cloud deployment.
  # Replace the echo commands with actual deployment steps for your provider:
  #   - Azure Container Apps: az containerapp update ...
  #   - Kubernetes: kubectl set image ...
  # ---------------------------------------------------------------------------
  deploy:
    name: 🚀 Deploy to Cloud
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy Reporting & Analytics Service
        run: |
          echo "============================================="
          echo "  DEPLOYMENT PLACEHOLDER"
          echo "============================================="
          echo "Service:  Reporting & Analytics"
          echo "Image:    taskappregistry9921.azurecr.io/reporting-analytics:${{ github.sha }}"
          echo "Status:   Ready for cloud deployment"
          echo ""
          echo "To enable real deployment, replace this step"
          echo "with your cloud provider's deployment command."
          echo "============================================="

  # ---------------------------------------------------------------------------
  # Job 5: Notify Results
  # ---------------------------------------------------------------------------
  notify:
    name: 📢 Notify Results
    runs-on: ubuntu-latest
    if: always()
    needs: [build-and-test, security-scan, docker-build-push, deploy]

    steps:
      - name: Check Pipeline Status
        run: |
          if [ "${{ needs.build-and-test.result }}" == "failure" ]; then
            echo "❌ Tests Failed - Pipeline stopped"
            exit 1
          fi
          if [ "${{ needs.security-scan.result }}" == "failure" ]; then
            echo "⚠️  Security scan failed - Review results"
          fi
          if [ "${{ needs.docker-build-push.result }}" == "success" ]; then
            echo "✅ Docker image built and pushed successfully"
          fi
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "🚀 Deployment to Cloud successful"
          fi

