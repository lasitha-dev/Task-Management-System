# =============================================================================
# CI/CD Pipeline for User Management Microservice
# =============================================================================
# This workflow handles the full lifecycle: Build → Test → Security Scan →
# Docker Image Push → Deployment for the User Management service.
# It only triggers when files inside the user-management/ directory change.
# =============================================================================

name: User Management CI/CD

# ---------------------------------------------------------------------------
# Trigger: Only run on pushes to 'main' that modify user-management files
# ---------------------------------------------------------------------------
on:
  push:
    branches: [main]
    paths:
      - 'user-management/**'
      - '.github/workflows/user-management-ci.yml'
  workflow_dispatch:

# ---------------------------------------------------------------------------
# Job 1: Build & Test
# ---------------------------------------------------------------------------
# Installs dependencies and runs the Jest test suite with coverage reporting.
# This is the gate — all subsequent jobs depend on this passing.
# ---------------------------------------------------------------------------
jobs:
  build-and-test:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./user-management

    steps:
      # Step 1: Checkout the repository source code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Setup Node.js 18 runtime (matches our Dockerfile base)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: user-management/package-lock.json

      # Step 3: Install dependencies using clean install for reproducibility
      - name: Install Dependencies
        run: npm ci

      # Step 4: Run unit/integration tests with coverage output
      - name: Run Tests
        run: npm test

  # ---------------------------------------------------------------------------
  # Job 2: Security Scan (DevSecOps)
  # ---------------------------------------------------------------------------
  # Uses Snyk to scan for vulnerabilities in both code and dependencies.
  # Continues on error so findings are logged without blocking the pipeline.
  # Requires SNYK_TOKEN secret to be configured in the repository.
  # ---------------------------------------------------------------------------
  security-scan:
    name: 🔒 Snyk Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: ./user-management

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: user-management/package-lock.json

      # Install deps so Snyk can resolve the full dependency tree
      - name: Install Dependencies
        run: npm ci

      # Run Snyk vulnerability scan on the project dependencies
      - name: Run Snyk Vulnerability Scan
        uses: snyk/actions/node@master
        continue-on-error: true # Log findings without failing the pipeline
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --project-name=user-management
          command: test

  # ---------------------------------------------------------------------------
  # Job 3: Docker Build & Push to Azure Container Registry (ACR)
  # ---------------------------------------------------------------------------
  docker-build-push:
    name: 🐳 Docker Build & Push to Azure
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Authenticate with Azure Container Registry using your secrets
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: taskappregistry9921.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Build and push the backend container image to Azure
      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./user-management
          file: ./user-management/Dockerfile
          push: true
          tags: |
            taskappregistry9921.azurecr.io/user-management:latest
            taskappregistry9921.azurecr.io/user-management:${{ github.sha }}

      # Build and push the frontend container image to Azure
      - name: Build and Push Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./user-management/frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL_USERS }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_USER_APP_URL=${{ secrets.VITE_USER_APP_URL }}
            VITE_TASK_APP_URL=${{ secrets.VITE_TASK_APP_URL }}
            VITE_NOTIFICATIONS_APP_URL=${{ secrets.VITE_NOTIFICATIONS_APP_URL }}
            VITE_REPORTING_APP_URL=${{ secrets.VITE_REPORTING_APP_URL }}
          tags: |
            taskappregistry9921.azurecr.io/user-frontend:latest
            taskappregistry9921.azurecr.io/user-frontend:${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Job 4: Deploy (Placeholder)
  # ---------------------------------------------------------------------------
  # This job serves as a placeholder for cloud deployment.
  # Replace the echo commands with actual deployment steps for your provider.
  # ---------------------------------------------------------------------------
  deploy:
    name: 🚀 Deploy to Cloud
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Deploy Service
        run: |
          echo "============================================="
          echo "  DEPLOYMENT PLACEHOLDER"
          echo "============================================="
          echo "Service:  User Management"
          echo "Image:    taskappregistry9921.azurecr.io/user-management:${{ github.sha }}"
          echo "Status:   Ready for cloud deployment"
          echo "============================================="